- title: Blob Narrative Update 11/17/20
  date: 2020-11-17
  year: 2020
  description: |
    <p>We continue tracking heatwave NEP20b, which reached a maximum size of ~9.1 million km^2 in late September 2020, but has decreased in size over the last month to its present area of ~7 million km^2. At its maximum size, NEP20b was the 2nd largest MHW (by a very slight margin) seen in this region since satellite monitoring and analysis began in 1982.<p></p>NEP20b directly followed NEP20a, which was mainly centered in the northwest of the study region and had temperatures exceeding 2.0 SD above normal. NEP20a reached a maximum size of ~4 million km^2 on April 26, 2020, making it the 9th largest MHW over the past 38 years. After April, however, NEP20a lost strength and eventually split into smaller fragments. NEP20b arose from one of these fragments in early June, growing steadily and re-encompassing the area once occupied by NEP20a (which in turn, followed NEP19, see above) by early August, 2020. Over the last month, NEP20b has continuously decreased in size due to cooling in the coastal region, but still consists of a considerably large pool of anomalously warm water just outside of the US West Coast EEZ. This recession is similar to that seen with NEP19 during October and November, 2019; however, this year’s recession of the heatwave is approximately 1 month later than in 2019. An animation of marine heatwave development during 2020 can be viewed here.<p></p>The smaller yet intensely warm area we had been tracking within the southern California Bight has now shrunk and cooled considerably in the last two weeks, splitting off from the main portion of NEP20b and leaving mostly cool or average water temperatures in this region. We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
- title: Blob Narrative Update 10/14/20
  date: 2020-10-14
  year: 2020
  description: |
    <p>We continue tracking heatwave NEP20b, which reached a maximum size of ~9.1 million km^2 in late Sept, but has decreased in size over the last two weeks to its present area of ~ 6M km^2. This makes NEP20b the 2nd largest MHW (by a very slight margin) seen in this region since satellite monitoring and analysis began in 1982. Please note this is a slight revision from our last post, where we measured NEP20b as the largest ever heatwave in this region; that result was based on the provisionary data used for Fig. 1 (see Fig 1 legend), whereas our final estimate is based on the delayed, highest science quality data (see Fig 2 legend). NEP20b directly followed NEP20a, which was mainly centered to the northwest with temperatures exceeding 2.0 SD above normal in late April 2020. NEP20a reached a maximum size of ~4 million km<sup>2</sup>, making it the 9th largest MHW over the past 38 years (Fig. 5); after April, however, NEP20a lost strength and eventually split into smaller fragments. NEP20b arose from one of these fragments in early June, growing steadily and re-encompassing the area once occupied by NEP20a (which in turn, followed NEP19, see above) in early August, 2020. Over the past two weeks, NEP20b has decreased in size due to  cooling in the far offshore region, leaving a considerable pool of warm water approximately  100km offshore of the US west coast; in contrast, the size contraction of NEP19 during the fall of 2019 was characterized by cooling of waters closer to shore with warm waters remaining in the western portion of the analyzed region. The portion of NEP20b near the coast appears to be held at bay by continued coastal upwelling, as seen by the negative SST anomalies (blue in Fig. 1) in these regions. An animation of marine heatwave development during 2020 can be viewed here.</p><p>The smaller yet intensely warm area we have been tracking within the southern California Bight has varied in size and strength over the last three months, but has generally grown in size, and has now merged with NEP20b (Fig. 1).  We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p><p>The Northeast Pacific Marine Heatwave of 2019, also known as NEP19, decreased below our heat wave classification thresholds and ended in terms of its surface expression on January 17, 2020. NEP19 lasted 239 days and covered approximately 8.5 million km<sup>2</sup> at its peak (Fig. 4, 5; archived images can be found here), officially becoming the second largest and longest event recorded in the northern Pacific Ocean since 1982, when satellite-based remote sensing of sea surface temperatures began in a consistent fashion.</p>
- title: Blob Narrative Update 9/20/20
  date: 2020-09-20
  year: 2020
  description: |
    <p>We continue tracking heatwave NEP20b, which has gained size over the past two weeks to become the largest heatwave by area (~9.8 million km<sup>2</sup>) since monitoring began in 1982 (Fig. 1). This feature split apart into a far offshore component and a nearshore component around Aug. 9, 2020; however, these two parts reconnected in late August, and then extending further south, bringing it to its current size.  This heatwave follows NEP20a, which was mainly centered to the northwest with temperatures exceeding 2.0 SD above normal around Apr 26, 2020. NEP20a reached a maximum size of ~4 million km<sup>2</sup>, making it the 9th largest MHW over the past 38 years (Fig. 5). Since April, however, NEP20a lost strength, and eventually split into smaller fragments. NEP20b arose from one of these fragments in early June, growing steadily and re-encompassing the area once occupied by NEP20a (which in turn followed on NEP19, see below) by around August 1, 2020.  NEP20b appears to be held at bay by relatively strong coastal upwelling, as seen by the negative SST anomalies (blue in Fig. 1) in these regions. An animation of marine heatwave development during 2020 can be viewed here: <a href='https://youtu.be/EjH1miyY1I8' target='_blank'>https://youtu.be/EjH1miyY1I8</a></p><p>The smaller yet intensely warm area we we continue track within the southern California Bight has varied in size and strength over the past few months, but has generally grown in size (Fig. 1). Although this area has been anomalously warm for several months, it remains under our size-based threshold for declaration of an independent MHW. If this region were to connect with NEP20b to the north, as occurred during the 2014 event, the area of this feature would further increase the size of NEP20b. We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p><p>The Northeast Pacific Marine Heatwave of 2019, also known as NEP19, decreased below our heat wave classification thresholds and ended in terms of its surface expression on January 17, 2020. NEP19 lasted 239 days and covered approximately 8.5 million km<sup>2</sup> at its peak (Fig. 4, 5; archived images can be found here), officially becoming the second largest and longest event recorded in the northern Pacific Ocean since 1982, when satellite-based remote sensing of sea surface temperatures began in a consistent fashion.</p>
- title: Blob Narrative Update 9/9/20
  date: 2020-09-09
  year: 2020
  description: |
    <p>We continue tracking heatwave NEP20b, which has gained size over the past three weeks to become the 3rd largest heatwave by area (~6.5 million km<sup>2</sup>) since monitoring began in 1982 (Fig. 1). This feature split apart into a far offshore component and a nearshore component around Aug. 9th; however, these two parts reconnected in late August, bringing it to its current size.  This heatwave follows NEP20a, which was mainly centered to the northwest with temperatures exceeding 2.0 SD above normal around Apr 26th. NEP20a reached a maximum size of ~4 million km<sup>2</sup>, making it the 9th largest MHW over the past 38 years (Fig. 5). Since April, however, NEP20a lost strength, and eventually split into smaller fragments. NEP20b arose from one of these fragments in early June, growing steadily and re-encompassing the area once occupied by NEP20a (which in turn followed on NEP19, see below) by around August 1, 2020.  NEP20b appears to be held at bay by relatively strong coastal upwelling, as seen by the negative SST anomalies (blue in Fig. 1) in these regions. An animation of marine heatwave development during 2020 can be viewed here: <a href='https://youtu.be/EjH1miyY1I8' target='_blank'>https://youtu.be/EjH1miyY1I8</a></p><p>The smaller yet intensely warm area we we continue track within the southern California Bight has varied in size and strength over the last few weeks, but has generally grown over the past two months (Fig. 1). Although this area was anomalously warm for several months, it remains under our size-based threshold for declaration of an independent MHW. If this region were to connect with NEP20b to the north, as occurred during the 2014 event, the area of this feature could eventually rival that of the largest heatwave on record. We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p><p>The Northeast Pacific Marine Heatwave of 2019, also known as NEP19, decreased below our heat wave classification thresholds and ended in terms of its surface expression on January 17, 2020. NEP19 lasted 239 days and covered approximately 8.5 million km<sup>2</sup> at its peak (Fig. 4, 5; archived images can be found here), officially becoming the second largest and longest event recorded in the northern Pacific Ocean since 1982, when satellite-based remote sensing of sea surface temperatures began in a consistent fashion.</p>
- title: Blob Narrative Update 8/20/20
  date: 2020-08-20
  year: 2020
  description: |
    <p>We continue tracking heatwave NEP20b, most of which is currently located offshore in the far west region of our analysis domain (Fig. 1). This feature split apart into a far offshore component and a nearshore component around Aug. 9th, however, these two parts could easily reconnect as there is still a considerable amount of sub-threshold, yet anomalously warm water between the two parts.  This heatwave follows NEP20a, which was mainly centered to the northwest with temperatures exceeding 2.0 SD above normal around Apr 26th. NEP20a reached a maximum size of ~4 million km<sup>2</sup>, making it the 9th largest MHW over the past 38 years (Fig. 5). Since April, however, NEP20a lost strength, and eventually split into smaller fragments. NEP20b arose from one of these fragments in early June, growing steadily and re-encompassing the area once occupied by NEP20a (which in turn followed on NEP19, see below) by around Aug 1st..  The portion of NEP20b nearer to the coast appears to be held at bay by coastal upwelling, as seen by the negative SST anomalies (blue in Fig. 1) in these regions.</p><p>The small yet intensely warm area we were tracking within the southern California Bight has decreased considerably in size and strength (Fig. 1). Although this area was anomalously warm for several months, it remains under our size-based threshold for declaration of an independent MHW. We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p><p>The Northeast Pacific Marine Heatwave of 2019, also known as NEP19, decreased below our heat wave classification thresholds and ended in terms of its surface expression on January 17, 2020. NEP19 lasted 239 days and covered approximately 8.5 million km<sup>2</sup> at its peak (Fig. 4, 5; archived images can be found here), officially becoming the second largest and longest event recorded in the northern Pacific Ocean since 1982, when satellite-based remote sensing of sea surface temperatures began in a consistent fashion.</p>
- title: Blob Narrative Update 8/5/20
  date: 2020-08-05
  year: 2020
  description: |
    <p>We are continuing to track heatwave NEP20b, most of which is currently located further offshore, however, it has considerable coastward extensions nearing the northern CA, and OR/WA coastline (Fig. 1). This heatwave follows on NEP20a, which was centered mainly to the northwest, and  reached a size of ~4 million km^2 with intensities in excess of 2 STDEVs above normal around Apr 26th (making it the 9th largest MHW over the past 38 years).  Since April, however, that heatwave lost strength, and eventually split into a few smaller pieces.  NEP20b appears to have reformed in the same area as those smaller fragments, and has grown steadily since it arose in early June, now re-encompassing the area once occupied by NEP20a (which in turn followed on NEP19, see below).  The heatwave appears to be held at bay from the coast by relatively strong coastal upwelling as seen by the negative anomalies in SST (blue on Fig. 1) seen along the coast.</p><p>The warm area we were tracking off of the southern California Bight (Fig. 2) has considerably decreased in size and strength (Fig.1).  This area was anomalously warm for several months, however, its size remained below our classification scheme for a heatwave. We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
- title: Blob Narrative Update 7/12/20
  date: 2020-07-12
  year: 2020
  description: |
    <p>We are now tracking heatwave NEP20b, most of which is currently located to the far offshore southwest, however, it has a small tongue which extends towards the OR/WA coastline (Fig. 1). This heatwave follows on NEP20a, which was centered mainly to the northwest, and  reached a size of ~4 million km^2 with intensities in excess of 2 STDEVs above normal around Apr 26th (making it the 9th largest MHW over the past 38 years).  Since April, however, that heatwave lost strength, and eventually split into a few smaller pieces.  NEP20b appears to have reformed in the same area as those smaller fragments, and has grown steadily since it arose in early June, now re-encompassing the area once occupied by NEP20a (which in turn followed on NEP19, see below).</p><p>There remains a fairly intense, yet small, warm region within the southern California Bight (Fig. 1).  This area has remained anomalously warm for several months now, however, its size is below our classification scheme for a heatwave.</p><p>The Northeast Pacific Marine Heatwave of 2019, also known as NEP19, decreased below our heat wave classification thresholds and ended in terms of its surface expression on January 17, 2020. NEP19 lasted 239 days and covered approximately 8.5 million km<sup>2</sup> at its peak (Fig. 4, 5; archived images can be found in the 'Previous Images' tab above), officially becoming the second largest and longest event recorded in the northern Pacific Ocean since 1982, when satellite-based remote sensing of sea surface temperatures began in a consistent fashion.</p>
- title: Blob Narrative Update 6/23/20
  date: 2020-06-23
  year: 2020
  description: |
    <p>After the decline of NEP19 in January 2020 (see below), a fairly large pool of anomalously warm water remained in that same location.  Temperatures in this offshore pool of water again surpassed our marine heatwave threshold on Feb19, and have remained above threshold through this current posting (Fig. 1,2,5).  This new heatwave, NEP20, reached a size of ~4 million km^2 with intensities in excess of 2 STDEVs above normal (Fig. 5.) around Apr 26th.  That maximum size places it within the top 10 largest MHWs that have occurred over the past 38 years.  Since April, however, this heatwave has lost some strength, eventually splitting into a few smaller pieces.  Although the main core to the NW remains a fairly strong heatwave, in general terms, its far offshore location suggests this heatwave will have few impacts on our coastal ecosystems.</p><p>However, the leftover remnants of NEP20 (discussed above) have formed as smaller, secondary warm-water features off the coasts of southern California and northern California / Oregon. Though extremely warm, neither feature has yet reached our size-based threshold for declaration of independent MHWs. We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p><p>Additionally, there was a smaller, secondary feature which formed off the coast of southern CA.  This fairly warm feature, however, only reached a size of ~150,000 km<sup>2</sup>, and thus has not quite reached our size-based threshold for declaration of a MHW.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these two features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p><p>Currently, there is another fairly large patch of anomalously warm water located off the coast of northern California and Oregon.  This patch of warm water is actually a leftover remnant of the southeastern-most extent of the earlier heatwave centered to the NW region (discussed above) from before that feature was broken up into several smaller patches.</p><p>The Northeast Pacific Marine Heatwave of 2019, also known as NEP19, decreased below our heat wave classification thresholds and ended in terms of its surface expression on January 17, 2020. NEP19 lasted 239 days and covered approximately 8.5 million km<sup>2</sup> at its peak (Fig. 4, 5; archived images can be found <a href='https://oceanview.pfeg.noaa.gov/mhw/prev'>here</a>), officially becoming the second largest and longest event recorded in the northern Pacific Ocean since 1982, when satellite-based remote sensing of sea surface temperatures began in a consistent fashion.</p>
- title: Blob Narrative Update 5/24/20
  date: 2020-05-24
  year: 2020
  description: |
    <p>After the decline of NEP19 in January 2020 (see below), a fairly large pool of anomalously warm water remained in that same location.  Temperatures in this offshore pool of water again surpassed our marine heatwave threshold on Feb19, and have remained above threshold through this current posting (Fig. 1,2,5).  This new heatwave, NEP20, reached a size of ~4 million km^2 with intensities in excess of 2 STDEVs above normal (Fig. 5.) around Apr 26th.  That maximum size places it within the top 10 largest MHWs that have occurred over the past 38 years.  Since April, however, this heatwave has lost some strength, eventually splitting into a few smaller pieces.  Looking at the details, its far offshore location suggests this heatwave will have few impacts on our coastal ecosystems. </p><p>Additionally, there was a smaller, secondary feature which formed off the coast of southern CA.  This fairly warm feature, however, only reached a size of ~150,000 km<sup>2</sup>, and thus has not quite reached our size-based threshold for declaration of a MHW.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these two features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
- title: Blob Narrative Update 4/29/20
  date: 2020-04-29
  year: 2020
  description: |
    <p>After the decline of NEP19 in January 2020 (see below), a fairly large pool of anomalously warm water has remained in the far offshore region of our analysis domain. Temperatures in this offshore pool of water surpassed our marine heatwave threshold briefly, from February 21-March 7, 2020, and again from March 14, 2020 continuing through the current posting (Fig. 1,2,5).  This new heatwave, NEP20, has now reached a size of ~4 million km^2 with intensities in excess of 2 STDEVs above normal (Fig. 5.).  Its current size now places it within the top 10 largest MHWs that have occurred over the past 38 years.   Additionally, there is now a smaller, secondary feature which has formed off the coast of southern CA.  This fairly warm feature, however, has only reached a size of ~150,000 km<sup>2</sup>, and thus has not quite reached our size-based threshold for declaration of a MHW.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these two features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p><p>The Northeast Pacific Marine Heatwave of 2019, also known as NEP19, decreased below our heat wave classification thresholds and ended in terms of its surface expression on January 17, 2020. NEP19 lasted 239 days and covered approximately 8.5 million km<sup>2</sup> at its peak (Fig. 4, 5; archived images can be found <a href='https://oceanview.pfeg.noaa.gov/mhw/prev'>here</a>), officially becoming the second largest and longest event recorded in the northern Pacific Ocean since 1982, when satellite-based remote sensing of sea surface temperatures began in a consistent fashion.</p>
- title: Blob Narrative Update 4/5/20
  date: 2020-04-05
  year: 2020
  description: |
    <p>The 2019 MHW decreased below our MHW thresholds as of Jan 17, 2020.  This large MHW lasted 239 day and covered approximately 8.5 x10^6 km^2 area at its peak in Sept., 2019.  These metrics mark this event as the second largest and longest event on record since 1982, when satellite-based remote sensing of SST began in a consistent fashion.</p><p>Since the 2019 MHW’s decline in January 2020, although temperatures were below those of our thresholds, there remained a fairly large pool of anomalously warm water in the far offshore region of our analysis domain.  Beginning on Feb. 21, 2020, this far offshore pool of water again surpassed our heat wave threshold, but then briefly dipped below the threshold again on March 7th. However, on March 14th it again exceeded the threshold, and has continued until this current posting.  So far, its maximum area occurred on Feb 27th, during its first emergence, at a size of 2x10^6 km^2, which is larger than many previous features, but much smaller than either the 'blob' of 13-15 or the most recent MHW of 2019.  We will continue to track this current MHW of 2020 to see if it moves closer to the US west coast, within the US EEZ. </p>
- title: Blob Narrative Update 3/17/20
  date: 2020-03-17
  year: 2020
  description: |
    <p>The 2019 MHW, which first crossed our heat wave classification thresholds on May 22, 2019, finally decreased below those thresholds as of Jan 17, 2020, thus lasting 239 days.  At its peak in Sept, 2019, this large MHW covered approximately 8.5 x10^6 km^2.  These metrics mark this event as the second largest and longest event on record since 1982, when satellite-based remote sensing of SST began in a consistent fashion. </p><p>After its decline in January 2020, although temperatures were below those of our thresholds, there remained a fairly large pool of anomalously warm water in the far offshore region of our analysis domain.  Beginning on Feb. 21, 2020, this far offshore pool of water again surpassed our heat wave threshold, and has continued until the current posting, thus making this feature at least 24 days old.  So far, its maximum area occurred on Feb 27th, at a size of 2x10^6 km^2, which is larger than many previous features, but much smaller than the 'blob' of 13-15, and the most recent MHW of 2019.  We will continue to track this current MHW of 2020 to see if it moves closer to the US west coast, within the US EEZ.</p>
- title: Blob Narrative Update 1/22/20
  date: 2020-01-22
  year: 2020
  description: |
    <p>The 2019 MHW has now decreased below our heatwave classification thresholds, and as such, this heatwave has ended in terms of its surface expression, as of Jan 2, 2020.  There is still some remaining warmer than normal waters located in the far offshore region, however, these should have little impact on the CCS.  At its peak, the 2019 MHW covered approximately 8.5 x10^6 km^2, and lasted for 225 days.  This makes this event the second largest and longest event on record over the past 39 years. Whether the 2019 event is completely gone and will not return, is not clear, as there is some evidence that the deeper water may still be retaining significant amounts of heat.  As such, we will continue to monitor conditions in the NEP for any resurgene of futher hewatwave activity.</p>

