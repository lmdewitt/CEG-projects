- title: Update 12-12-22
  date: 2022-12-12
  year: 2022
  description: |
    <p>We continue to track large marine heatwave NEP22A that formed in late January 2022.  During November, this heatwave contracted in size to about 2.5 million km<sup>2</sup> (Fig. 1 and Fig 2), which is still a significantly large heatwave compared to past events.   The heatwave has receded from the nearshore coastal waters, with the US EEZ returning to normal or slightly colder than normal temperatures.  This large heatwave has now lasted over 300 days, making it the 3rd longest and 4th largest marine heatwave in this region since calculation of heatwave metrics began in 1982 due to availability of satellite data. </p>
    <p>A brief summary of the history of the 2022 heatwaves: NEP22A developed on Jan 18th, 2022 when it first exceeded our size threshold (>400,000 km<sup>2</sup> in area). By mid-February 2022, NEP22A had already reached an area of ~3 million km^2 (*Note: actual sizes may be larger than reported here as we are only considering the region bounded in Figure 2 for all presented analyses). Similar to previous years, this heatwave arose in the general offshore region where the previous year’s heatwave (NEP21A) terminated, and within 30 days of the end of that previous event. Thus, it is likely that the region may have had some residual warm waters which preconditioned the region for this new heatwave development. </p>
    <p>NEP22A remained mostly outside of the US EEZ (blue dashed line in Fig. 2) until Mid-May 2022, when there were major reversals in the typical southern pattern of winds which drive upwelling along the coast (view these winds here), most notably during May 5-19, May 22-28, and June 3-11. During these periods, NEP22A reached large portions of the central US west coast (regions 3 and 4 in Fig. 5), and up to 50% of some regions were in heatwave status during parts of May and June. These conditions are similar to, but of a larger scale than, what happened in 2021 when an "upwelling relaxation" event allowed an offshore heatwave (NEP21A) to impact the coast for a week in mid-June 2021. During late June and July, NEP22A also split into two fairly large, but slightly separated fragments, one to the north and one to the south.  Since that time, these features have merged and split several times, likely dependent on the large-scale wind patterns bisecting this area from west to east as driven by the large-scale atmospheric pressure fields.</p>We have also been tracking substantial warming off the coast of southern California, within the Southern California Bight (SCB). Conditions within the SCB and to the south along the coast remain warmer than normal, and have exceeded the heatwave threshold for most of the summer and now fall. Several times since the beginning of August, warming in the SCB has been contiguous with NEP22B, although the warming began much earlier than the large-scale intrusions of either MHW into the coastal region.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
- title: Update 10-17-22
  date: 2022-10-17
  year: 2022
  description: |
    <p>We continue to track the large marine heatwave NEP22A that formed in late January 2022.  During recent weeks, this heatwave has expanded to encompass nearly 8 million km<sup>2</sup>, and has lasted over 250 days, making this the 4th largest and 4th longest marine heatwave in this region since monitoring began in 1982. It now rivals the “Blob” of 2014-2015. After only a brief period of upwelling in late July, this heatwave, or its offshoots, have resided fairly close to shore for most of August-October and encompassed much of the coastline, although small patches of cool water had remained in various locations and times due to local upwelling. For the past several weeks, more than 50% of the US west coast EEZ has been in heatwave status (Figure. 4). Also notable is the increase in heatwave intensity (how much warmer the water is compared to normal) over the past several weeks in the further offshore region of the northern Northeast Pacific (Fig. 1 and 2). This indicates that NEP22A may still be gathering strength rather than dissipating, as most heatwaves do in the fall. </p>
    <p>A brief summary of the history of the 2022 heatwaves: NEP22A developed on Jan 18th, 2022 when it first exceeded our size threshold (>400,000 km<sup>2</sup> in area). By mid-February 2022, NEP22A had already reached an area of ~3 million km^2 (*Note: actual sizes may be larger than reported here as we are only considering the region bounded in Figure 2 for all presented analyses). Similar to previous years, this heatwave arose in the general offshore region where the previous year’s heatwave (NEP21A) terminated, and within 30 days of the end of that previous event. Thus, it is likely that the region may have had some residual warm waters which preconditioned the region for this new heatwave development. </p>
    <p>NEP22A remained mostly outside of the US EEZ (blue dashed line in Fig. 2) until Mid-May 2022, when there were major reversals in the typical southern pattern of winds which drive upwelling along the coast (view these winds here), most notably during May 5-19, May 22-28, and June 3-11. During these periods, NEP22A reached large portions of the central US west coast (regions 3 and 4 in Fig. 5), and up to 50% of some regions were in heatwave status during parts of May and June. These conditions are similar to, but of a larger scale than, what happened in 2021 when an "upwelling relaxation" event allowed an offshore heatwave (NEP21A) to impact the coast for a week in mid-June 2021. During late June and July, NEP22A also split into two fairly large, but slightly separated fragments, one to the north and one to the south.  Since that time, these features have merged and split several times, likely dependent on the large-scale wind patterns bisecting this area from west to east as driven by the large-scale atmospheric pressure fields.</p>
    <p>We have also been tracking substantial warming off the coast of southern California, within the Southern California Bight (SCB). Conditions within the SCB and to the south along the coast remain warmer than normal, and have exceeded the heatwave threshold for most of the summer and now fall. Several times since the beginning of August, warming in the SCB has been contiguous with NEP22B, although the warming began much earlier than the large-scale intrusions of either MHW into the coastal region.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
- title: Update 9-12-22
  date: 2022-09-12
  year: 2022
  description: |
    <p>We continue to track the large marine heatwave NEP22A that formed in late January 2022.  During late August 2022, a secondary large heatwave (NEP22B) re-merged with NEP22A (Fig. 1 and Fig 2), which now encompasses an area of roughly 7.6 million km^2, making this the 4th largest marine heatwave in this region since monitoring began in 1982. After only a brief period of upwelling in late July, these heatwaves have resided fairly close to shore for most of August and encompassed much of the coastline, although small patches of cool water remain in various locations and times due to local upwelling.</p>
    <p>Tracking the history of these heatwaves this year, NEP22A developed on Jan 18th, 2022 when it first exceeded our size threshold (>400,000 km^2 in area). By mid-February 2022, NEP22A had already reached an area of ~3 million km^2 (*Note: actual sizes may be larger than reported here as we are only considering the region bounded in Figure 2 for all presented analyses). Similar to previous years, this heatwave arose in the general offshore region where the previous year’s heatwave (NEP21A) terminated, and within 30 days of the end of that previous event. Thus, it is likely that the region may have had some residual warm waters which preconditioned the region for this new heatwave development. </p>
    <p>NEP22A remained mostly outside of the US EEZ (blue dashed line in Fig. 2) until mid May, 2022, when there were major reversals in the normal upwelling wind patterns <a href="https://coastwatch.pfeg.noaa.gov/erddap/griddap/esrlNcepRe.graph?uwnd%5B(2022-06-03T00:00:00Z)%5D%5B(52.5):(32.5)%5D%5B(222.5):(242.5)%5D,vwnd%5B(2022-06-03T00:00:00Z)%5D%5B(52.5):(32.5)%5D%5B(222.5):(242.5)%5D&.draw=vectors&.vars=longitude%7Clatitude%7Cuwnd%7Cvwnd&.color=0x000000&.bgColor=0xffccccff)" target="_blank">here</a>, most notably during May 5-19, May 22-28, and June 3-11.  During these periods, the large offshore heatwave reached large portions of the central US west coast (regions 3 and 4 from Figure 5; up to 50% of these regions were in heatwave status during parts of May and June).  These conditions are similar, but of a larger and longer scale, to what happened in 2021 when an “upwelling relaxation” event allowed the offshore heatwave to impact the coast during a week in mid-June 2021.  During late June and July, NEP22A also split into two, still fairly large, but slightly separated fragments, one to the northwest (NEP22A) and one to the southeast (NEP22B).  Since that time, these features have re-merged and re-split several times, likely dependent on the large-scale wind patterns bisecting this area from west to east as driven by the large-scale atmospheric pressure fields.  </p>
    <p>Besides these two large heatwaves, we have also been tracking substantial warming off the coast of southern California, within the Southern California Bight (SCB). Conditions within the SCB and to the south along the coast remain warmer than normal, and have exceeded the heatwave threshold for most of the summer. At several times since the beginning of August, warming in the SCB has been contiguous with NEP22B, although the warming began much earlier than the large-scale intrusions of either MHW into the coastal region. During the “blob” of 2014-2015, it was the eventual merging of the offshore developed heatwave to the nearshore southern California heatwave (a separate heatwave of its own), which led to the outstanding and unprecedented single giant heatwave of those years.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
- title: Update for 8-23-22
  date: 2022-08-23
  year: 2022
  description: |
    <p>In early August 2022, a secondary large marine heatwave (NEP22B) formed after splitting from NEP22A, the primary heatwave we have been tracking since January 2022. NEP22B entered the coastal region and has remained within the US west coast EEZ since that time (Fig. 1 and Fig 2).   Both NEP22B and NEP22A (discussed below), are quite large in area and contain very high sea surface temperature anomalies, up to 8°C above the normal temperatures for this time of year in some places. The recent entrance of NEP22A into the nearshore coastal region coincided with several large-scale wind relaxation events, which tend to cause either reduced coastal upwelling, or downwelling, depending on the length and strength of the relaxation. This follows a pattern, occurring as early as May 2022,of coastal intrusions by offshore heatwaves following wind relaxation events.  Although MHW features now encompass much of the coastline, small patches of cool water remain in various locations due to local upwelling.</p>
    <p>Tracking the history of these heatwaves this year, NEP22A (Fig. 2, now in the northwest of the study region), developed on Jan 18th, 2022 (Fig. 4b) when it first exceeded our size threshold (>400,000 km^2 in area). By mid-February 2022, NEP22A had already reached an area of ~3 million km^2 (*Note: actual sizes may be larger than reported here as we are only considering the region bounded in Figure 2 for all presented analyses). Similar to previous years, this heatwave arose in the general offshore region where the previous year’s heatwave (NEP21A) terminated, and within 30 days of the end of that previous event. Thus, it is likely that the region may have had some residual warm waters which preconditioned the region for this new heatwave development.</p>
    <p>NEP22A remained mostly outside of the US EEZ (blue dashed line in Fig. 2) until mid May, 2022, when there were major reversals in the normal upwelling wind patterns (<a href="https://coastwatch.pfeg.noaa.gov/erddap/griddap/esrlNcepRe.graph?uwnd%5B(2022-06-03T00:00:00Z)%5D%5B(52.5):(32.5)%5D%5B(222.5):(242.5)%5D,vwnd%5B(2022-06-03T00:00:00Z)%5D%5B(52.5):(32.5)%5D%5B(222.5):(242.5)%5D&.draw=vectors&.vars=longitude%7Clatitude%7Cuwnd%7Cvwnd&.color=0x000000&.bgColor=0xffccccff" target="_blank">see</a>), most notably during May 5-19, May 22-28, and June 3-11.  During these periods, the large offshore heatwave reached large portions of the central US west coast (regions 3 and 4 from Figure 5; up to 50% of these regions were in heatwave status during parts of May and June).  These conditions are similar, but of a larger and longer scale, to what happened in 2021 when an “upwelling relaxation” event allowed the offshore heatwave to impact the coast during a week in mid-June 2021.  During late June and July, NEP22A also split into two, still fairly large, but slightly separated fragments, one to the northwest (NEP22A) and one to the southeast (NEP22B).  Since that time, these features have re-merged and re-split several times, likely dependent on the large-scale wind patterns bisecting this area from west to east as driven by the large-scale atmospheric pressure fields.  </p>
    <p>Besides these two large heatwaves, we have also been tracking substantial warming off the coast of southern California, within the Southern California Bight (SCB). Conditions within the SCB and to the south along the coast remain warmer than normal, at times exceeding the heatwave threshold.  At several times since the beginning of August, warming in the SCB has been contiguous with NEP22B, although the warming began much earlier than the large-scale intrusions of either MHW into the coastal region. During the “blob” of 2014-2015, it was the eventual merging of the offshore developed heatwave to the nearshore southern California heatwave (a separate heatwave of its own), which led to the outstanding and unprecedented single giant heatwave of those years.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
- title: Update for 7-25-22
  date: 2022-07-25
  year: 2022
  description: |
    <p>We are continuing to track a large marine heatwave, NEP22A (Fig. 2), which developed on Jan 18th, 2022 (Fig. 4b) when it first exceeded our size threshold (>400,000 km^2 in area). By mid February 2022, NEP22A had already reached an area of ~3 million km^2 (*Note: actual sizes may be larger than reported here as we are only considering the region bounded in Figure 2 for all presented analyses). Similar to previous years, this heatwave arose in the general offshore region where the previous year’s heatwave (NEP21A) terminated, and within 30 days of the end of that previous event. Thus it is likely that the region may have had some residual warm waters which preconditioned the region for this new heatwave development. </p><p>NEP22A remained mostly outside of the US EEZ (blue dashed line in Fig. 2) until mid May, 2022, when there were major reversals in the normal upwelling wind patterns (<a href="https://coastwatch.pfeg.noaa.gov/erddap/griddap/esrlNcepRe.graph?uwnd%5B(2022-06-03T00:00:00Z)%5D%5B(52.5):(32.5)%5D%5B(222.5):(242.5)%5D,vwnd%5B(2022-06-03T00:00:00Z)%5D%5B(52.5):(32.5)%5D%5B(222.5):(242.5)%5D&.draw=vectors&.vars=longitude%7Clatitude%7Cuwnd%7Cvwnd&.color=0x000000&.bgColor=0xffccccff" target="_blank">see</a>), most notably during May 5-19, May 22-28, and June 3-11.  During these periods, the large offshore heatwave reached large portions of the central US west coast (regions 3 and 4 from Figure 5; up to 50% of these regions were in heatwave status during parts of May and June).  These conditions are similar, but of a larger and longer scale, to what happened in 2021 when an “upwelling relaxation” event allowed the offshore heatwave to impact the coast during a week in mid-June 2021.  During late June and July, NEP22A also split into two, still fairly large, but slightly separated fragments, one to the north and one to the south.  Since that time, these features have re-merged and re-split several times, likely dependent on the large-scale wind patterns bisecting this area from west to east as driven by the large-scale atmospheric pressure fields.  The most current raw SST anomaly (Figure 1) suggests that the northern and more offshore fragment has increased in intensity, whereas there are still considerable amounts of anomalously warm waters just offshore of the central and northern California coast.</p><p>Besides the large offshore heatwave, we have also been tracking substantial warming off the coast of southern California, within the Southern California Bight (the SCB). Conditions within the SCB and to the south along the coast remain warmer than normal, at times exceeding the heatwave threshold.  During the “blob” of 2014-2015, it was the eventual joining of the offshore developed heatwave to the nearshore southern California heatwave (a separate heatwave of its own), which led to the outstanding and unprecedented single giant heatwave of those years.  We will continue to monitor and report on the status of these heatwaves as they develop.</p>
- title: Update for 6-14-22
  date: 2022-06-14
  year: 2022
  description: |
    <p>We are continuing to track a large marine heatwave, NEP22A (Fig. 2), which developed on Jan 18th, 2022 (Fig. 4b) when it first exceeded our size threshold (>400,000 km^2 in area). By mid February 2022, NEP22A had already reached an area of ~3 million km^2, which is close to its current size, within our analyzed region of the eastern North Pacific. Similar to previous years, this heatwave arose in the general offshore region where the previous year’s heatwave (NEP21A) terminated, and within 30 days of the end of that previous event. Thus it is likely that the region may have had some residual warm waters which preconditioned the region for this new heatwave development.</p><p>The most recent raw SST anomaly plot (Fig. 1) suggests NEP22A has reached the US west coast. During May 5-19, May 22-28, and most recently June 3-11, there were major reversals in the typical southerly pattern of upwelling winds along the coast , which likely allowed the formerly offshore heatwave to reach the coast (for a view of these winds, (<a href="https://coastwatch.pfeg.noaa.gov/erddap/griddap/esrlNcepRe.graph?uwnd%5B(2022-06-03T00:00:00Z)%5D%5B(52.5):(32.5)%5D%5B(222.5):(242.5)%5D,vwnd%5B(2022-06-03T00:00:00Z)%5D%5B(52.5):(32.5)%5D%5B(222.5):(242.5)%5D&.draw=vectors&.vars=longitude%7Clatitude%7Cuwnd%7Cvwnd&.color=0x000000&.bgColor=0xffccccff" target="_blank">see</a>). These conditions are similar, but of a larger and longer scale, to what happened in 2021 when an “upwelling relaxation” event  allowed the offshore heatwave to impact the coast during a week in mid-June 2021.  NEP21A did not return to the coast, as upwelling winds remained fairly strong and consistent for the rest of the summer. Whether strong upwelling will re-commence and reduce the impacts of this 2022 heatwave on the coast are unknown at this time.</p><p>What is also different this year compared to previous years is that the heatwave this year developed nearly two months earlier than the last three years’ events, thus setting the stage for a potentially even larger event this year. Conditions could easily be modified by less-predictable atmospheric changes, which are beyond the scope of the analysis here. Besides the large offshore heatwave, we have also been tracking substantial warming off the coast of southern California, within the Southern California Bight. During the “blob” of 2014-2015, it was the eventual joining of the offshore developed heatwave to the nearshore southern California heatwave (a separate heatwave of its own), which led to the outstanding and unprecedented single giant heatwave of those years.  We will continue to monitor and report on the status of these heatwaves as they develop.</p>
- title: Update for 4-19-22
  date: 2022-04-19
  year: 2022
  description: |
    <p>We are continuing to track the first large marine heatwave of 2022, NEP22A (Fig. 2).  We have been tracking this heatwave since Jan 18th, 2022 (Fig. 4b), when it first exceeded our size threshold (>400,000 km^2 in area). By mid February 2022, NEP22A had already reached an area of ~3 million km^2 within our analyzed region of the eastern North Pacific, and it continues to hover around this extent. Similar to previous years, this heatwave arose in the general region where the previous year’s heatwave (in this case, NEP21A) terminated, and within 30 days of the end of that previous event. Thus it is likely that the region may have had some residual warm waters which preconditioned the region for this new heatwave development.</p><p>The most recent raw SST anomaly plot (Fig. 1) suggests NEP22A is continuing to expand toward the US west coast.  If this event follows the trend for the last three years, then we might expect this heatwave to continue to expand, and eventually encroach on the US West coast during late fall of 2022; however, this is speculative and could easily be modified depending on changes in atmospheric or oceanic conditions. For example, in 2020, the large heatwave that formed early in that year dissipated in late April into several sets of smaller, dispersed features, which eventually re-connected in mid-June 2020 to form what became the second largest heatwave on record since monitoring began in 1982, but which did not ultimately impact the coast until the later fall.  In contrast, during 2021, the large heatwave that formed that year, encroached directly on the central CA coast in mid June 2021 due to a relatively lengthy wind reversal, which led to downwelling rather than upwelling for a portion of the central CA coast, but then retreated offshore for the remainder of the year. </p><p>What is different this year compared to previous years is that the heatwave this year has developed nearly two months earlier than the last three years’ events, thus setting the stage for a potentially even larger event later this year. Conditions could easily be modified by less-predictable atmospheric changes, which are beyond the scope of the analysis here. Besides the large offshore heatwave, there is now substantial warming off the coast of southern California, within the Southern California Bight. During the “blob” of 2014-2015, it was the eventual joining of the offshore developed heatwave to the nearshore southern California heatwave, which led to the outstanding and unprecedented single giant heatwave of those years.  We will continue to monitor and report on the status of these heatwaves as they develop.</p>
- title: Update 2-24-22
  date: 2022-02-24
  year: 2022
  description: |
    <p>We are now tracking the first large marine heatwave of 2022, NEP22A (Fig. 2).  This heatwave exceeded our size threshold for tracking individual events on Jan 18th, 2022, and, as of Feb 9th, had already reached an area of 2.8 million km^2 within our analyzed region of the eastern North Pacific.  Similar to previous years, this heatwave arose in the general region where the previous year’s heatwave (in this case, NEP21A) terminated, and within 30 days of the end of that previous event.  Thus it is likely that the region may have had some residual warm waters which preconditioned the region for this new heatwave development.  The most recent raw SST anomaly plot (Fig. 1) suggests NEP22A is continuing to expand.  If this event follows the trend for the last three years, then we might expect this heatwave to continue to expand, and eventually encroach on the US West coast during late fall of 2022, however, this is speculative and could easily be modified depending on changes in atmospheric or oceanic conditions.  We will continue to monitor and report on the status of this heatwave as it develops.  </p><p>Animations and images of past years' developing heatwaves can be found here: NEP20B animation; NEP19 archived images.</p><p>View new and ongoing analyses highlighting regional conditions associated with individual west coast National Marine Sanctuaries and states (Washington, Oregon, and northern, central, and southern California).</p>
- title: Update 2-1-22
  date: 2022-02-01
  year: 2022
  description: |
    <p>Heatwave NEP21A, which we began tracking in late April 2021 in the same region where NEP20b declined (see description, paragraph above), finally decreased in area below our tracking threshold on Dec. 22, 2021. NEP21A fell below our area-tracking threshold mainly because it split up into several smaller fragments (Fig. 2), thus there is still a large amount of anomalously warm water in the far offshore region, it just is not in a single contiguous large patch.  The latest satellite imagery (Fig. 1) shows some slightly warm coastal anomalies separate from the remaining pieces of the large offshore heatwave.<p></p>To summarize the progression of NEP21A during 2021: After formation in April 2021, and strengthening and increasing in size during May, NEP21A broke into smaller fragments in early June, but then reformed during late June, continued to expand, and reached the Canadian coastline in August. A lack of strong upwelling winds (in fact, there was nearly a 1 week period of complete wind direction reversal) led to anomalously warm temperatures along much of California and southern OregonJune; this warm coastal water was contiguous with the main offshore heatwave. Upwelling winds, leading to cooler coastal temperatures, then resumed by mid-July 2021, during which NEP21A receded from the coast. However, NEP21A  remained fairly strong in offshore waters (Fig. 2) and reached an area of approximately 4,100,000 km<sup>2</sup> by late August, making it the 7th largest heatwave in terms of area since monitoring began in 1982, and eventually the 5th longest in terms of duration, by the time of its decline in late Dec. 2021.<p></p>Waters in the southern California Bight were also warmer than normal during much of the spring and summer of 2021, a separate feature from NEP21A. We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>

