- title: Update 3-3-25
  date: 2025-03-03
  year: 2025
  description: |
    <p>We continue to track a large marine heatwave denoted as NEP24A (see southern portions of Figures 1 and 2). NEP24A began around ~April 28th, 2024, hence the name which denotes that this heatwave was the first to arise - A - during 2024, although it has continued now into 2025.  This heatwave reached its maximum size of ~6 million km2 on Sept 3, 2024, then decreased in size during the fall before reaching its current size (~ 3 million km2). NEP24A currently ranks as the 6th largest by area and 4th longest by duration since satellite monitoring began in 1982.  NEP24A is slightly unusual compared to recent similarly large marine heatwaves in that it has lingered into the later winter/spring period in this southern part of the examined region; other similar heatwaves that have lingered into the late winter/spring were generally located to the northwest of this region within the Gulf of Alaska.  Coastal sea surface temperatures within the EEZ (exclusive economic zone, denoted by blue dashed line on figures) remain close to the long term average.</p>
    <p>The <a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">current heatwave forecast</a> suggests NEP24A may continue for the next several months (in the south-central to eastern portion of the region). The El Niño forecast suggests that the La Niña watch status is likely to persist for several more months (see <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank">https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>).  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts.</p>
- title: Update 1-22-25
  date: 2025-01-22
  year: 2025
  description: |
    <p>We continue to track a large marine heatwave denoted as NEP24A (see southern portions of Figures 1 and 2). NEP24A began around ~April 28th, reached its maximum size of ~6 million km^2 on Sept 3, 2024, then decreased in size during the fall before reaching its current size (~ 4 million km^2). Over the past several weeks, however, this heatwave has regained size, and a new heatwave (NEP25A) has developed in the northern part of the region within the Gulf of Alaska (Fig.1). NEP24A currently ranks as the 6th largest by area and 5th longest by duration since satellite monitoring began in 1982.  If the heatwave in the northern part of the region persists (NEP25A) and merges with NEP24A, the combined heatwave would encompass much of the northeast Pacific and represent a rather unique and large event for this time of the year. We will present additional analysis of NEP25A once more up-to-date OISST data is available.</p>
    <p>The <a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">current heatwave forecast</a> suggests that NEP24A may continue for the next several months (in the south-central to eastern portion of the region), whereas NEP25A (to the North) is more likely to dissipate. The El Niño forecast suggests that the La Niña watch status is likely to persist for several more months (see <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank">https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>).  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts.</p>

