- title: Blob Narrative Update 12/22/19
  date: 2019-12-22
  year: 2019
  description: |
    <p>The 2019 MHW is still very strong and very large, but has further decreased in area and intensity, according to the latest imagery (12/22/19).  The feature remains far offshore, and thus is likely not having many direct effects on our coastline.  The MHW is currently 215 days in age, and covers &sim;2 million km<sup>2</sup>.  This area is at the smaller range of past MHWs, however, its age now places it as the longest lasting single contiguous MHW tracked over the past 39 years. Although there were multiple, temporally overlapping MHWs during the 2013-2015 period known as the "Blob" (meaning that there was nearly always at least one large MHW somewhere within the CCS during the 2013-2016 period), the longest single individually trackable MHW during that time frame lasted 205 days.</p>
- title: Blob Narrative Update 12/1/19
  date: 2019-12-01
  year: 2019
  description: |
    The 2019 MHW is still very strong and very large.  According to latest imagery (12/1/19) the feature has decreased slightly in size during the past few weeks, but has maintained a relatively large size and moderate intensity, since a large drop in mid Oct.  The feature is still very far offshore, however, and thus is likely not having many direct effects on our coastline.  The MHW is currently approximately 195 days in age, and &sim;65 million km<sup>2</sup>, which still places it within the top 5 largest events over the past 38 years, surpassed only by the features which occurred during the "BLOB" years, and a fairly large, but shorter lived event from the fall of 2004.
- title: Blob Narrative Update 11/17/19
  date: 2019-11-17
  year: 2019
  description: |
    The 2019 MHW is still very strong and very large.  According to latest imagery (11/17/19) the feature has actually regained some size and intensity, since a dip in mid Oct.  The feature is still very far offshore, however, and thus is likely not having many direct effects on our coastline.  The MHW is currently approximately 178 days in age, and &sim;6 million km<sup>2</sup>, which still places it within the top 5 largest events over the past 38 years, surpassed only by the features which occurred during the "BLOB" years, and a fairly large, but shorter lived event from the fall of 2004.
- title: Blob Narrative Update 11/5/19
  date: 2019-11-05
  year: 2019
  description: |
    <p>We continue to track the marine heatwave known as the <a href="https://www.fisheries.noaa.gov/feature-story/new-marine-heatwave-emerges-west-coast-resembles-blob">Northeast Pacific Marine Heatwave of 2019</a>, or NEP19. In early October, we observed the heatwave split into two distinct features. Our latest images (Fig. 1,2) show the marine heatwave has reformed into a single, yet smaller, feature (as compared to its maximum size in August 2019) and has moved farther offshore. We see surface temperatures have cooled across much of the nearshore areas for the entire US west coast; southern OR and northern CA are currently experiencing colder than average temperatures (Fig. 1).</p><p>Even with this decrease in size and intensity, the current marine heatwave, which formed in May 2019, is still among the most significant events seen in the northern Pacific Ocean during the last 40 years (Fig. 4,5), with continued <a href="https://coastwatch.pfeg.noaa.gov/elnino/coastal_conditions.html">sea surface temperatures</a> as much as 3&deg;C above average. Like the blob, NEP19 formed as changes in atmospheric conditions dampened the winds that otherwise mix and cool the ocean's surface. Unlike the blob of 2014-15, which remained near the coast during the fall and winter during 2014, the current MHW has retreated to a location much further offshore.</p><p>Conditions will become increasingly dynamic as fall and winter storms begin forming in the Northeast Pacific. We continue to monitor the area, duration, and coastal proximity of this marine heatwave and coordinate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
    
