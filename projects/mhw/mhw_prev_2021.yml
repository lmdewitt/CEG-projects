    <p>Marine heatwave NEP20b, which began in May 2020 and reached a maximum size of ~9.1 million km<sup>2</sup> in late September 2020, steadily decreased in size during the winter and spring, continued moving further offshore, and fell below the area threshold (400,000 km^2) for classification as a large marine heatwave on April 4th, 2021 (Fig 4b).  At its maximum size, NEP20b was the 2nd largest MHW (by a very slight margin) seen in this region since satellite monitoring and analysis began in 1982 (Fig. 4). It is also now one of the longest lasting heatwaves on record, having lasted 309 days.  An animation of marine heatwave development during 2020 can be viewed <a href='https://youtu.be/EjH1miyY1I8' target='_blank'> here</a>. </p><p>Marine heatwave NEP20b, which began in May 2020 and reached a maximum size of ~9.1 million km<sup>2</sup> in late September 2020, steadily decreased in size during the winter and spring, continued moving further offshore, and fell below the area threshold (400,000 km^2) for classification as a large marine heatwave on April 4th, 2021 (Fig 4b).  At its maximum size, NEP20b was the 2nd largest MHW (by a very slight margin) seen in this region since satellite monitoring and analysis began in 1982 (Fig. 4). It is also now one of the longest lasting heatwaves on record, having lasted 309 days. </p>
- title: Blob Narrative Update 4/14/21
  date: 2021-04-14
  year: 2021
  description: |
    <p>Heatwave NEP20b, which began in May 2020, and reached a maximum size of ~9.1 million km^2 in late September 2020, has steadily decreased in area during the winter and spring (now at ~800,000 km^2 in area) and continued moving further offshore (Fig. 2). Given its distance from shore, the majority of the US west coast EEZ (blue dashed outline in figures) currently has no waters in heatwave status (Fig. 5).  At its maximum size, NEP20b was the <b>2nd largest MHW</b> (by a very slight margin) seen in this region since satellite monitoring and analysis began in 1982 (Fig. 4).  It is also now one of the longest lasting heatwaves, at 304 days, as of March 29, 2021.</p><p>NEP20b directly followed NEP20a (which in turn directly followed NEP19, a very large marine heatwave that lasted from mid 2019 to Feb 2020), and was mainly centered in the northwest of the study region with temperatures exceeding 2 standard deviations above normal. NEP20a reached a maximum size of ~4 million km^2 on April 26, 2020, making it the 9th largest MHW over the past 38 years (Fig. 4). After April, however, NEP20a lost strength and eventually split into smaller fragments. NEP20b arose from one of these fragments in early June, growing steadily and re-encompassing the area once occupied by NEP20a by early August, 2020. NEP20b then receded to further offshore during Nov and Dec.  This recession is similar to that seen with NEP19 during October and November, 2019; however, the 2020 recession of the heatwave is approximately 1 month later than in 2019. An animation of marine heatwave development during 2020 can be viewed <a href='https://youtu.be/EjH1miyY1I8' target='_blank'> here</a>
- title: Blob Narrative Update 2/10/21
  date: 2021-02-10
  year: 2021
  description: |
    <p>Heatwave NEP20b, which reached a maximum size of ~9.1 million km^2 in late September 2020, has steadily decreased in area over the past two months (now at ~700,000 km^2 in area) and moved further offshore (Fig. 1). Given its distance from shore, the majority of the US west coast EEZ (blue dashed outline in figures) currently has no waters in heatwave status (Fig. 5).  At its maximum size, NEP20b was the <b>2nd largest MHW</b> (by a very slight margin) seen in this region since satellite monitoring and analysis began in 1982 (Fig. 4).  </p><p>NEP20b directly followed NEP20a, which was mainly centered in the northwest of the study region and had temperatures exceeding 2.0 SD above normal. NEP20a reached a maximum size of ~4 million km^2 on April 26, 2020, making it the 9th largest MHW over the past 38 years (Fig. 5). After April, however, NEP20a lost strength and eventually split into smaller fragments. NEP20b arose from one of these fragments in early June, growing steadily and re-encompassing the area once occupied by NEP20a (which in turn, followed NEP19, see above) by early August, 2020.  As discussed below, NEP20b then receded to further offshore during Nov and Dec.  This recession is similar to that seen with NEP19 during October and November, 2019; however, this year’s recession of the heatwave is approximately 1 month later than in 2019. An animation of marine heatwave development during 2020 can be viewed <a href='https://youtu.be/EjH1miyY1I8' target='_blank'> here</a>.</p><p>The smaller yet intensely warm area we had been tracking within the Southern California Bight has now completely dissipated, with waters off southern California returning to near normal temperatures for this time of year  (Fig. 1) and leaving mostly cool or climatological water temperatures in this region. We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
- title: Blob Narrative Update 1/4/21
  date: 2021-01-04
  year: 2021
  description: |
    <p>We continue tracking heatwave NEP20b, which reached a maximum size of ~9.1 million km^2 in late September 2020, but has decreased in size over the last 4 months to its present area of ~2.5 million km^2 (Fig. 1, Fig. 5). At its maximum size, NEP20b was the 2nd largest MHW (by a very slight margin) seen in this region since satellite monitoring and analysis began in 1982 (Fig. 4).  The current heatwave has slowly moved further and further offshore and to the south, and is currently completely outside of the US west coast EEZ (blue dashed line in Fig. 1).<p></p>NEP20b directly followed NEP20a, which was mainly centered in the northwest of the study region and had temperatures exceeding 2.0 SD above normal. NEP20a reached a maximum size of ~4 million km^2 on April 26, 2020, making it the 9th largest MHW over the past 38 years (Fig. 5). After April, however, NEP20a lost strength and eventually split into smaller fragments. NEP20b arose from one of these fragments in early June, growing steadily and re-encompassing the area once occupied by NEP20a (which in turn, followed NEP19, see above) by early August, 2020.  As discussed below, NEP20b then receded to further offshore during Nov and Dec.  This recession is similar to that seen with NEP19 during October and November, 2019; however, this year’s recession of the heatwave is approximately 1 month later than in 2019.</p><p>The smaller yet intensely warm area we had been tracking within the Southern California Bight has now completely dissipated, with waters off southern California returning to near normal temperatures for this time of year  (Fig. 1) and leaving mostly cool or climatological water temperatures in this region. We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>

