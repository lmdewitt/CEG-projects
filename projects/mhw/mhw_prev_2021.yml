  description: |
    <p>Marine heatwave NEP20b, which began in May 2020 and reached a maximum size of ~9.1 million km<sup>2</sup> in late September 2020, steadily decreased in size during the winter and spring, continued a displacement further offshore, and fell below the area threshold (400,000 km^2) for classification as a large marine heatwave on April 4th, 2021 (Fig 4b).  At its maximum size, NEP20b was the 2nd largest MHW (by a slight margin) seen in this region since satellite monitoring and analysis began in 1982 (Fig. 4). It is also now one of the longest lasting MHWs on record, having lasted 309 days. An animation of marine heatwave development during 2020 can be viewed <a href='https://youtu.be/EjH1miyY1I8' target='_blank'> here</a>.</p></p>In late April 2021, another large heatwave (NEP21A) began to form (Fig. 2), in the same region near where NEP20b declined.  As of June 4th, this new heatwave (NEP21A) had reached an area of approximately 2,400,000 km^2 (Fig 2, 4b), nearly tripling in area over the past three weeks, and advancing ~100km closer to the US west coast (now at approximately 800km offshore).  Given its distance from shore, the majority of the US west coast EEZ (blue dashed outline, Fig. 2, 5) currently has no waters in heatwave status (with the exception of a small region of warm water within the southern California bight), however, the most recent SST anomaly plots, at the time of the writing of this update, indicate that 2021A is continuing to expand (Fig.1).  We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts
