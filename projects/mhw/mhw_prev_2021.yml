- title: Blob Narrative Update 10-26-21
  date: 2021-10-26
  year: 2021
  description: |
    <p>We continue to track large marine heatwave NEP21A (Fig. 2), which began in late April 2021 in the same region where NEP20b declined (see description, paragraph above). This recent heatwave has now begun to shrink in size and recede from the coast. The latest satellite imagery (Fig. 1) suggests that the recession has been fairly rapid over the past two weeks, likely hastened by the record-breaking (in terms of rainfall) storm which impacted the entire west coast between Oct. 23-35. The progression of this heatwave is thus unlike the past two years, during which heatwaves built up in offshore regions but then directly impacted the coast during Oct-Nov.</p><p>After NEP21A formed in April 2021, it began to break into smaller fragments in early June, but then reformed during late June, continued to expand, and reached the Canadian coastline. A lack of strong upwelling winds also led to anomalously warm temperatures along much of the US west coast during June, conditions which are separate from the effects of the large marine heatwave. Upwelling winds, leading to cooler coastal temperatures, then resumed by mid-July 2021, during which NEP21A receded from the coast. However, NEP21A  remained fairly strong in offshore waters (Fig. 2) and reached an area of approximately 4,100,00 km<sup>2</sup> by late August, placing it within the top 10 heatwaves in terms of area since monitoring began in 1982. Waters in the Southern California Bight were also warmer than normal during much of the spring and summer, a separate feature from NEP21A. We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
- title: Blob Narrative Update 10/12/2021
  date: 2021-10-12
  year: 2021
  description: |
    <p>We are continuing to track a large marine heatwave (NEP21A, Fig. 2).  During mid-June, this warm water feature began to break up into smaller fragments, but then reformed during late June, continued to expand, and reached the Canadian coastline. A lack of strong upwelling winds also led to anomalously warm temperatures along much of the US west coast during June, conditions which are separate from the effects of the large marine heatwave. Upwelling winds leading to cooler coastal temperatures then resumed by mid- July 2021 during which NEP21A receded from the coast. However, NEP21A has remained fairly strong in offshore waters (Fig. 2), and reached an area of approximately 4,100,000 km<sup>2</sup> by late August, placing it within the top 10 heatwaves in terms of area since monitoring began in 1982. Waters in the Southern California Bight remain warmer than normal, a separate feature from the main NEP21A heatwave. If the course of this current heatwave follows those of the past two years, we might expect to see further incursions of this heatwave into the coastal regions of Oregon and Washington sometime within the next few weeks as the seasonal cycle of upwelling transitions to a more downwelling mode, although the advance of the current heatwave is lagging in time compared to the progression of the similar feature from last year.  We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p><p>Marine heatwave NEP20b, which began in May 2020 and reached a maximum size of ~9,100,000 km<sup>2</sup> in late September 2020, steadily decreased in size during the winter and spring, continued a displacement further offshore, and fell below the area threshold (400,000 km<sup>2</sup>) for classification as a large marine heatwave on April 4th, 2021 (Fig 4b).  At its maximum size, NEP20b was the <b>2nd largest MHW</b> (by a slight margin) seen in this region since satellite monitoring and analysis began in 1982 (Fig. 4). It is also now one of the longest lasting MHWs on record, having lasted 309 days.</p>
- title: Blob Narrative Update 9/7/21
  date: 2021-09-07
  year: 2021
  description: |
    <p>We are currently tracking a large marine heatwave (NEP21A, Fig. 2).  This heatwave began in late April 2021, in the same region where NEP20b declined (see description, next paragraph below).  As of June 4, 2021, NEP21A had reached an area of approximately 2,400,000 km<sup>2</sup> (Fig 2, 4b), nearly tripling in area over the three prior weeks, and advancing ~100 km closer to the US west coast.  During mid-June, this warm water feature began to break up into smaller fragments, but then reformed during late June, continued to expand, and reached the Canadian coastline. A lack of strong upwelling winds also led to anomalously warm temperatures along much of the US west coast during June, conditions which are separate from the effects of the large marine heatwave. Upwelling winds then resumed by mid- July 2021, leading to cooler coastal temperatures, during which NEP21A receded from the coast.   However, this heatwave has remained fairly strong in the offshore waters (Fig. 2), reaching an area of approximately 4,100,000 km<sup>2</sup> by late August, placing it within the top 10 heatwaves in terms of area since monitoring began in 1982.  If the course of this current heatwave follows those of the past two years, we might expect to see further incursions of this heatwave into the coastal regions of Oregon and Washington sometime within the next month, as the seasonal cycle of upwelling transitions to a more downwelling mode.  Waters in the Southern California Bight remain warmer than normal, a separate feature from the main NEP21A heatwave.  We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p></p>Marine heatwave NEP20b, which began in May 2020 and reached a maximum size of ~9.1 million km<sup>2</sup> in late September 2020, steadily decreased in size during the winter and spring, continued a displacement further offshore, and fell below the area threshold (400,000 km^2) for classification as a large marine heatwave on April 4th, 2021 (Fig 4b).  At its maximum size, NEP20b was the <b>2nd largest MHW</b> (by a slight margin) seen in this region since satellite monitoring and analysis began in 1982 (Fig. 4). It is also now one of the longest lasting MHWs on record, having lasted 309 days.
- title: Blob Narrative Update 8/3/21
  date: 2021-08-03
  year: 2021
  description: |
    <p>In late April 2021, another large heatwave (NEP21A) began to form (Fig. 2) in the same region where NEP20b declined (see description, next paragraph below).  As of June 4, 2021, NEP21A had reached an area of approximately 2,400,000 km<sup>2</sup> (Fig 2, 4b), nearly tripling in area over the three prior weeks, and advancing ~100 km closer to the US west coast (now approximately 800 km offshore).  During mid-June, this warm water feature began to break up into smaller fragments, but then reformed during late June, continued to expand, and reached the Canadian coastline. A lack of strong upwelling winds also led to anomalously warm temperatures along much of the US west coast during June, conditions which are separate from the effects of the large marine heatwave.  As of the writing of this post, upwelling winds had resumed by mid-July 2021, leading to cooler coastal temperatures (Fig. 2), while NEP21A had receded from the coast while remaining fairly strong in the offshore waters (Fig. 2). Waters in the Southern California Bight remain warmer than normal, but are considered a separate feature from the main NEP21A heatwave.  We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p></p>Marine heatwave NEP20b, which began in May 2020 and reached a maximum size of ~9.1 million km<sup>2</sup> in late September 2020, steadily decreased in size during the winter and spring, continued a displacement further offshore, and fell below the area threshold (400,000 km^2) for classification as a large marine heatwave on April 4th, 2021 (Fig 4b).  At its maximum size, NEP20b was the <b>2nd largest MHW</b> (by a slight margin) seen in this region since satellite monitoring and analysis began in 1982 (Fig. 4). It is also now one of the longest lasting MHWs on record, having lasted 309 days.</p>
- title: Blob Narrative Update 7/1/21
  date: 2021-07-01
  year: 2021
  description: |
    <p>In late April 2021, another large heatwave (NEP21A) began to form (Fig. 2) in the same region where NEP20b declined (see description, next paragraph below).  As of June 4, 2021, NEP21A had reached an area of approximately 2,400,000 km<sup>2</sup> (Fig 2, 4b), nearly tripling in area over the three prior weeks, and advancing ~100 km closer to the US west coast (now approximately 800 km offshore).  During mid-June, this warm water feature began to break up into smaller fragments (Fig. 2).  At the time of the writing of this update, however, the most recent SST anomaly plots (Fig. 1) indicate that NEP21A has reformed, is continuing to expand, and has reached the Canadian coastline. A lack of strong upwelling winds has also led to anomalously warm temperatures along much of the US west coast, conditions which are separate from the effects of the large marine heatwave.  We continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p><p>Marine heatwave NEP20b, which began in May 2020 and reached a maximum size of ~9.1 million km<sup>2</sup> in late September 2020, steadily decreased in size during the winter and spring, continued a displacement further offshore, and fell below the area threshold (400,000 km^2) for classification as a large marine heatwave on April 4th, 2021 (Fig 4b).  At its maximum size, NEP20b was the 2nd largest MHW (by a slight margin) seen in this region since satellite monitoring and analysis began in 1982 (Fig. 4). It is also now one of the longest lasting MHWs on record, having lasted 309 days.</p>
