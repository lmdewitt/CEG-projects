          <p><b>Update 10-04-23</b></p>
          <p>We continue to track marine heatwave NEP23A (Fig. 1 and 2), which formed in mid May 2023 and continues through this current update. NEP23A has decreased in area and receded from much of the coast (Fig. 1), after reaching its maximum size during late September (7.6 million km<sup>2</sup>). The rapid decrease in size was driven by the combined effects of a strong storm moving across the northern California Current region, and upwelling winds along most of the southern California Current. Relative to past large MHWs, NEP23A was comparable to the 2022 event (NEP22A) and now stands as the 4th largest by area and within the top 20 by duration.</p>
          <p>The current heatwave forecast (<a href='https://psl.noaa.gov/marine-heatwaves/' target='_blank'>https://psl.noaa.gov/marine-heatwaves/</a>) suggests that coastal waters will continue to cool and NEP2023A will remain offshore through the fall, with an increased risk of coastal warming in the spring of 2024.  Furthermore, we are still in an <a href='https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml' target='_blank'>“El Niño advisory”</a> status, with a 95% chance that El Niño will persist through the Northern Hemisphere winter (see <a href='https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml' target='_blank'>https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>). Unlike the events in 2014-2015, the last time this system had a strong marine heatwave with an El Niño looming, the current heatwave appears to be receding rather than building in strength, making it more similar to the heatwaves tracked over the past 4 years. Thus, we expect to see a return to cooler coastal temperatures until the El Niño brings back warmer coastal conditions in the late winter/early spring. We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts.</p>
          <p><b>Update 9–11-23</b></p>
          <p>We are currently tracking marine heatwave (MHW) NEP23A (Fig. 1 and 2), which formed in mid May 2023 and continues through this current update. After a short decrease in size last month, with a brief recession from the coastline, NEP23A has now again increased in area (covering at least 6 million km<sup>2</sup>, Fig. 4), and has now reached <a href='https://www.fisheries.noaa.gov/feature-story/large-marine-heatwave-reaches-oregon-and-washington-coasts' target='_blank'>the Canadian and US west coasts</a> (Fig. 1 and 2). and has reemerged along nearly the entire US west coast (Fig. 1,2, and 5).  Compared to past large MHWs, NEP23A now stands as the 4th largest by area, and within the top 20 by duration. However, NEP23A formed in the same region where the previous MHW (NEP22A) decreased in size below our area tracking threshold only a few days before this new heatwave arose. Thus, although we denote NEP23A as a “new” heatwave, it is likely an extension of the previous event because it formed in a region where much of the ocean surface temperatures were already elevated above normal, but just below our MHW thresholds.</p>
          <p>The current heatwave forecast (<a href='https://psl.noaa.gov/marine-heatwaves/' target='_blank'>https://psl.noaa.gov/marine-heatwaves/</a>) suggests that NEP2023A will continue in the offshore waters through the fall, with an increased risk of coastal warming in the spring of 2024.  Additionally, we are currently in an <a href='https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml' target='_blank'>“El Niño advisory”</a> status, with a greater than 90% chance that El Niño will persist through the Northern Hemisphere winter (see <a href='https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml' target='_blank'>https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>). El Niño combined with the current large offshore marine heatwave, may indicate the system is heading towards conditions similar to that encountered in 2014-2015, the last period during which we had a similar confluence of these two extremes. However, it is also possible that the heatwave may follow the previous pattern of the last 4 years, which would instead see a weakening of the heatwave and recession further offshore during Oct-Nov.  If that is the case, then we expect to see a return to cooler coastal temperatures until the El Niño brings back warmer coastal conditions in the early spring.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
          <p><b>Current conditions update 8–8-23</b></p>
          <p>We are currently tracking marine heatwave (MHW) NEP23A, that formed in mid May 2023 and continues through this current update. NEP23A has been increasing in size during the past months, and has now reached <a href='https://www.fisheries.noaa.gov/feature-story/large-marine-heatwave-reaches-oregon-and-washington-coasts' target='_blank'>the Canadian and US west coasts</a> (Fig. 1 and 2). This large heatwave formed in the same region where the previous MHW (NEP22A) dissipated below our area tracking threshold only a few days before this new heatwave arose. Thus, although we denote NEP23A as a “new” heatwave, it is an extension of the previous event because it formed in a region where much of the ocean surface temperatures were already elevated above normal, but just below our MHW thresholds. Warming off the coast of OR and WA has reached at least 4°C above normal (normal being defined as the average temperature at a specific location for the specific time of year), with the northern coast of CA also seeing some increased warming.*Note that at the time of this update, parts of the current heatwave are warmer than the scale given in Fig.1, with temperatures reaching approximately 5°C above normal (darkest red region in Fig. 1 denotes area that is above scale).</p>
          <p>The current heatwave forecast (<a href='https://psl.noaa.gov/marine-heatwaves/' target='_blank'>https://psl.noaa.gov/marine-heatwaves/</a>) suggests that NEP2023A will continue in the offshore waters through this summer, with an increased risk of coastal warming in the spring of 2024.  Additionally, we are currently in an <a href='https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml' target='_blank'>“El Niño advisory”</a> status, with a greater than 90% chance that El Niño will persist through the Northern Hemisphere winter (see <a href='https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml' target='_blank'>https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>). El Niño combined with the current large offshore marine heatwave, may indicate the system is heading towards conditions similar to that encountered in 2014-2015, the last period during which we had a similar confluence of these two extremes. However, it is also possible that the heatwave may follow the previous pattern of the last 4 years, which would instead see a weakening of the heatwave and recession further offshore during Oct-Nov.  If that is the case, then we expect to see a return to cooler coastal temperatures until the El Niño brings back warmer coastal conditions in the early spring.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
          <p><b>Update 7-20-23</b></p>
          <p>We are currently tracking the large marine heatwave (LMH, defined as a contiguous area > 400,000 km<sup>2</sup> with temperatures within the top 10% seen for that region on that specific day over the past 40 years), denoted as NEP23A, that formed in mid May 2023 and continues through this current update. NEP23A has been generally increasing in size during the past months, and slowly advancing towards the Canadian and US west coasts (Fig. 1 and 2). This large heatwave formed in the same region where the previous LMH (NEP22A) dissipated below our area tracking threshold only a few days before this new heatwave arose. Thus although we denote NEP23A as a “new” heatwave, it formed in a region where much of the ocean surface temperatures were already elevated above normal, but were just below our thresholds for heatwave tracking, making this new heatwave an extension of that previous event. The previous event, NEP22A, formed in mid Jan 2022, reached its maximum size in August 2022 (becoming the 4th largest marine heatwave by area since monitoring began in 1982) and lasted for 483 days, making it also the 2nd longest heatwave on record.</p>
          <p>We also highlight recent coastal warming off central and southern CA (Fig. 2), which is not connected to the large offshore marine heatwave. This warming may be a combination of local forcing, and/or a noted shift in wind patterns in that region leading to lower upwelling (the supply of cold water from below along the coast due to southerly winds), a phenomena that has occurred in other years in this region.  The area that is warmer than normal within this coastal region (Fig. 2; the science-quality, time-delayed data used for analysis) is still below our area tracking threshold, but we will continue to monitor this area.</p>
          <p>The current heatwave forecast (<a href='https://psl.noaa.gov/marine-heatwaves/' target='_blank'>https://psl.noaa.gov/marine-heatwaves/</a>) suggests that NEP2023A will continue in the offshore waters through this summer.  Additionally, we are currently in an <a href='https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml' target='_blank'>“El Nino advisory” status</a>, with a greater than 90% chance that El Niño will continue through the Northern Hemisphere winter. (see <a href='https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml' target='_blank'>https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>) El Niño combined with the current large offshore marine heatwave, may indicate the system is heading towards conditions similar to that encountered in 2014-2015, the last period during which we had a similar confluence of these two extremes.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
          <p><b>Update 6-20-23</b></p>
          <p>We are currently tracking the large marine heatwave (LMH, defined as a contiguous area > 400,000 km<sup>2</sup> with temperatures within the top 10% seen for that region on that specific day over the past 40 years), denoted as NEP23A, that formed in mid May 2023 and continues through this current update.  This large heatwave formed in the same region where the previous LMH (NEP22A) dissipated below our area tracking threshold only a few days before this new heatwave arose. Thus although we denote NEP23A as a “new” heatwave, it formed in a region where much of the ocean surface temperatures were already elevated above normal, but were just below our thresholds for heatwave tracking, making this new heatwave an extension of that previous event.  The previous event, NEP22A, formed in mid Jan 2022, reached its maximum size in August 2022 (becoming the 4th largest marine heatwave by area since monitoring began in 1982) and lasted for 483 days, making it also the 2nd longest heatwave on record.</p>
          <p>We also highlight recent coastal warming off central and southern CA (Fig. 1), which is not connected to the large offshore marine heatwave.  This warming may be a combination of local forcing, and/or a noted shift in wind patterns in that region leading to lower upwelling (the supply of cold water from below along the coast due to southerly winds), a phenomena that has occurred in other years in this region.  The area that is warmer than normal within this coastal region (Fig. 2; the science-quality, time-delayed data used for analysis) is still below our area tracking threshold, but we will continue to monitor this area.</p>
          <p>The current heatwave forecast (<a href='https://psl.noaa.gov/marine-heatwaves/' target='_blank'>https://psl.noaa.gov/marine-heatwaves/</a>) suggests that NEP2023A will continue in the offshore waters through this summer.  Additionally, we note that the liklihood of El Niño developing this summer and fall has increased over the past months (see <a href='https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml' target='_blank'>https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>) and we are <a href='https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml' target='_blank'>currently in an "El Niño watch" status</a>.  El Niño combined with the current large offshore marine heatwave, may indicate the system is heading towards conditions similar to that encountered in 2014-2015, the last period during which we had a similar confluence of these two extremes.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
          <p><b>Update 3-20-23</b></p>
          <p>We continue to track large marine heatwave (LMH) NEP22A that formed in late January 2022 and has continued through at least March 2023. After contracting during fall 2022 (Fig. 4b) from its maximum extent in Aug (Fig. 3b), this heatwave again increased in size during late Dec/January 2023 to approximately 4 million km<sup>2</sup>. After January, this heatwave steadily decreased until about mid Feb, after which, this feature has now shown slow expansion to its current state. Unlike heatwaves of the past several years, which tend to fully disperse and fall below our tracking threshold typically during Jan-Mar, NEP22A instead has remained above these thresholds, lasting over 400 days, making it the 2rd longest and 4th largest marine heatwave in this region since 1982, when satellite monitoring data became available. </p>
          <p>A brief summary of 2022 heatwave history: NEP22A developed on Jan 18th, 2022, when it first exceeded our LMH size threshold (>400,000 km<sup>2</sup> in area for an individual event). By mid-February 2022, NEP22A had already reached an area of ~3 million km<sup>2</sup> (*Note: actual sizes may be larger than reported here as we are only considering the region bounded in Figure 2 for all presented analyses). Similar to previous years, this heatwave arose in the general offshore region where the previous year’s heatwave (NEP21A) terminated, and within 30 days of the end of that previous event. Thus, it is likely that the region may have had some residual warm waters which preconditioned the region for this new heatwave development. </p>
          <p>NEP22A remained mostly outside of the US EEZ (blue dashed line in Fig. 2) until Mid-May 2022, when there were major reversals in the typical southern pattern of winds which drive upwelling along the coast (view these winds here), most notably during May 5-19, May 22-28, and June 3-11. During these periods, NEP22A reached large portions of the central US west coast EEZ (regions 3 and 4 in Fig. 5), and up to 50% of some regions were in heatwave status during parts of May and June. After only a brief period of upwelling in late July, this heatwave or its offshoots resided fairly close to shore for most of August-October 2022 and encompassed much of the coastline, although small patches of cool water remained in various locations and times due to local upwelling (Figure 4). </p>
          <p>The current heatwave forecast (<a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">https://psl.noaa.gov/marine-heatwaves/</a>) suggests that NEP2022A will continue in the offshore waters through this summer.  We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible west coast impacts.</p>
