          <p><b>Update 12-03-24</b></p>
          <p>We continue to track a large (~ 3 million km2 in area currently) marine heatwave (MHW), denoted as NEP24A (Fig. 1 and 2). This MHW began in late April (~April 28th), slowly grew to approximately 3.5 million km2 over the summer, decreased slightly in size during late July, and then expanded to its maximum size during August (~6 million km2 on Sept 3rd), occupying >50% of the west coast Exclusive Economic Zone (EEZ) during late August (Figure 4b; the red shading on the bars indicates > 50% coverage). NEP24A was the 6th largest by area and 7th longest by duration since satellite monitoring began in 1982. This heatwave emerged with the same timing from a similar region far offshore as MHWs have in the past 5 years, and so far this year it has followed the same pattern as previous heatwave events. During October and November, heatwave conditions decreased in the nearshore within the EEZ, while the main body of the heatwave has remained further offshore and is now located in the more southern part of the analyzed region (Fig 1 and 2).</p>
          <p>The <a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">current heatwave forecast</a> suggests that NEP24A will continue to decline in size and strength over the fall in nearshore regions, following the spatiotemporal pattern described above. whereas heatwaves to the far southwest of the region may continue. The El Niño forecast suggests that a weak La Niña is likely to emerge in October-December 2024 and persist through January-March 2025 (see <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank">https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>), a pattern which typically leads to cooler coastal waters. We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts.</p>
          <p><b>Update 10-23-24</b></p>
          <p>We continue to track a large (~ 4 million km2 in area currently) marine heatwave (MHW), denoted as NEP24A (Fig. 1 and 2). This MHW began in late April (~April 28th), slowly grew to approximately 3.5 million km2 over the summer, decreased slightly in size during late July, and then expanded to its maximum size during August (~6 million km2), occupying >50% of the west coast Exclusive Economic Zone (EEZ) during late August (Figure 4b; the red shading on the bars indicates > 50% coverage). NEP24A emerged with the same timing as MHWs have in the previous 5 years from a similar region far offshore. So far this year, this heatwave has followed the pattern seen in previous years and heatwave events.  During October, heatwave conditions have decreased in the nearshore within the EEZ, while the main body of the heatwave has remained further offshore and is now located more to the south part of the analyzed region (Fig 1 and 2).</p>
          <p>The <a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">current heatwave forecast</a> suggests that NEP24A will continue to decline in size and strength over the fall in nearshore regions, following a pattern similar to heatwaves in the past in this area, but may remain in the southern far offshore region. The El Niño forecast suggests that we are in an ENSO neutral state with a possible transition to a La Niña state this winter (see <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank">https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>). We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts.</p>
          <p><b>Update 9-12-24</b></p>
          <p>We continue to track a large (~ 6 million km2 in area) marine heatwave which has expanded into coastal regions during the past several weeks (Fig. 1 and 2). This MHW, denoted as NEP24A, began in late April (~April 28th), slowly grew to approximately 3.5 million km2 over the summer, decreased slightly in size during late July, and then expanded to its current size during August and September, occupying >50% of the west coast Exclusive Economic Zone (EEZ) during late August (Figure 4b; the red shading on the bars indicates > 50% coverage). NEP24A emerged with the same timing as MHWs have in the previous 5 years from a similar region far offshore. So far this year, this heatwave has followed the pattern seen in previous years and heatwave events.  With the now widespread intrusion of this heatwave into the coastal region, we may begin to see impacts in coastal waters of the California Current ecosystem.</p>
          <p>The <a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">current heatwave forecast</a> suggests that we are in an ENSO neutral state and will most likely transition to a La Niña state by September - November of 2024 (see <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank">https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>). We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts.</p>
          <p><b>Update 8-19-24</b></p>
          <p>We are tracking a fairly large (~ 2.5 million km^2 in area) marine heatwave which has expanded and moved closer to shore during the past month (Fig. 1 and 2). This MHW, denoted as NEP24A, began in late April (~April 28th), slowly grew to approximately 3.5 million km^2 over the summer, decreased slightly in size during late July, and then expanded to its current size during August (Fig. 4b). NEP24A emerged with the same timing as MHWs have in the previous 5 years and in a similar region far offshore. If the current pattern follows these past events, we can expect NEP24A to possibly grow in size during the next month and likely impact the coastal waters during the fall, particularly in the Pacific Northwest where this heatwave is already fairly close to shore (small portions of it have already intersected the shore off OR/NorCAL). In contrast, most of central California has remained average to cooler than average near the coast due to continued moderate to strong upwelling in those regions.</p>
          <p>The <a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">current heatwave forecast</a> suggests that the current heatwave will continue for the next several months, at least in the offshore region. The current El Niño forecast suggests that we are in an ENSO neutral state and will most likely transition to a La Niña state by the fall of 2024 (see <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank">https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>). We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts. </p>
          <p><b>Update 5-28-24</b></p>
          <p>Although the Pacific is still technically experiencing an El Niño, conditions along the equator show that the strength of the El Niño has been steadily decreasing since Feb. Along the US west coast, sea surface temperature anomalies have returned to values near their climatological averages over the last month (Fig. 1, 2, and 4), reflecting the weakening influence of El Niño in this region. Instead, we have seen fairly strong southward winds, which lead to upwelling and cooling of the surface waters in the coastal region. However, in late April (~April 28th), another large MHW ~2 million km2 in area developed in the far offshore region of our study area. This MHW, denoted as NEP24A, emerged with the same timing as MHWs have in the previous 5 years. If the current pattern follows these past events, we can expect NEP24A to slowly grow in size and possibly impact the coastal waters during the fall.</p>
          <p>The <a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">current heatwave forecast</a> suggests that there will be only minimal if any warming along the coast during the summer, with likely continued warming in the far offshore region, a pattern consistent with current observations. The current El Niño forecast suggests that we are transitioning towards an ENSO neutral state during May - June and then most likely will transition to a La Niña state by the fall of 2024 (see <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank">https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>). We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts.</p>
          <p><b>Update 4-19-24</b></p>
          <p>Although the Pacific is still technically experiencing an El Niño, conditions along the equator show that the strength of the El Niño has decreased (see <a href="https://www.climate.gov/news-features/blogs/enso/april-2024-enso-update-gone-fishing/" target="_blank"> April 2024 ENSO update: gone fishing | NOAA Climate.gov</a>). Along the US west coast, sea surface temperature anomalies have steadily decreased and are approaching climatological averages over the last month (Fig. 1, 2, and 4), reflecting the weakening influence of El Niño in this region. However, there are still considerable areas of anomalously warm temperatures  in pockets along the coast.  As in previous years, it is likely that anomalously warm areas in offshore regions to the northwest may develop into a larger heatwave that continues through the summer and into fall, with possible coastal impacts.</p>
          <p>The <a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">current heatwave forecast</a> suggests that the warming along the coast will most likely subside, consistent with the weakening of the El Niño, although the far offshore northwest area will likely remain warmer than normal through the summer. Current El Niño forecast suggests that we will enter an ENSO neutral state sometime from May - June and then most likely transition to a La Niña state by the fall of 2024 (see <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank">https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>). We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts.</p>
          <p><b>Update 3-12-24</b></p>
          <p>The California Current system is currently in an El Niño state, with coastal waters that are warmer than normal for this time of year (Fig. 1 and 2). El Niño can bring a marine heatwave to the CCS, with different drivers and ecological consequences than the "typical", large, offshore-derived, marine heatwaves usually tracked here. Rather than a single contiguous heatwave, the current sea surface temperature anomaly pattern is much more patchy in distribution, with many smaller fragments scattered throughout the coastal and offshore regions. Hence we are not currently tracking any individual large marine heatwaves (our threshold for tracking individual marine heatwaves is when they cover a contiguous area > 400,000 km2). Instead, we refer to Figure 4b, which shows that within the EEZ, these smaller patchy heatwaves summed together currently cover at least 25% of that area, and had covered > 50% during late Jan/early Feb.</p>
          <p>The <a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">current heatwave forecast</a> suggests that the warming along the coast has a high probability of persisting through April, with the far offshore remaining warmer than normal through the summer. We continue to be in an "El Niño advisory" status, meaning we are currently in an El Niño state, with a >70% chance that the system will return to a more neutral state sometime from April - June and a similar chance of transitioning back to a La Niña state by the fall of 2024 (see <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank">https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>). We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts.</p>
          <p><b>Update 1-08-24</b></p>
          <p>The California Current system has now transitioned to an El Niño state, with coastal waters that are warmer than normal for this time of year (Fig. 1 and 2). El Niño is essentially another type of marine heatwave, with different drivers and ecological consequences than the “typical” large, offshore-derived marine heatwaves usually tracked here. Of the two previously tracked marine heatwaves, NEP23A, formed in mid-May 2023 and reached its maximum size (~7.6 million km^2) during late September 2023, decreased in area and receded from the coast during October, and fell below our tracking threshold in late November. The second large marine heatwave, NEP23B, which arose in late October in the south-central portion of the region, has essentially merged with the signature of the current coastal warming related to the ongoing El Niño.</p>
          <p>The <a href="https://psl.noaa.gov/marine-heatwaves/" target="_blank">current heatwave forecast</a> suggests that the warming along the coast (essentially NEP23B) has a high probability of persisting for the next few months. We continue to be in an "El Niño advisory" status, meaning we are currently in an El Niño state, with a 55% chance that this El Niño will obtain a “strong” categorization, although a 60% chance that the system will return to a more neutral state sometime from April - June (see <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank">https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml</a>). We will continue to monitor the area, duration, and coastal proximity of surface water temperatures for these features in the northeast Pacific and communicate with other researchers and policy-makers to understand the array of possible West Coast impacts.</p>

    - id: "prev_2023"
